version: '3.8'

services:
  db:
    image: postgres:15
    container_name: crm_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@db:5432/crm_db?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WHATSAPP_SESSION_PATH: /app/whatsapp-session
      WHATSAPP_DEFAULT_COMPANY_ID: ${WHATSAPP_DEFAULT_COMPANY_ID:-}
    volumes:
      - whatsapp_session:/app/whatsapp-session
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  whatsapp_session:
